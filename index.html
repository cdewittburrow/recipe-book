<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0e0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Recipe Book</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --bg:           #0f0e0c;
      --surface:      #1a1917;
      --card:         #222018;
      --amber:        #c9933a;
      --amber-light:  #e8b566;
      --amber-dim:    #8a6228;
      --cream:        #f0e6d0;
      --cream-dim:    #a89880;
      --muted:        #6b6660;
      --border:        rgba(201,147,58,0.15);
      --border-subtle: rgba(255,255,255,0.08);
      --radius:       10px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--cream);
      font-size: 16px;
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
    }

    #app { height: 100%; display: flex; flex-direction: column; }
    .view { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .view.active { display: flex; }
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    button { cursor: pointer; border: none; background: none; font-family: var(--font-body); color: inherit; }
    input, textarea, select { font-family: var(--font-body); }

    /* ── Loading ── */
    .loading { display: flex; align-items: center; gap: 10px; padding: 40px 20px; color: var(--muted); font-size: .9rem; justify-content: center; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border-subtle); border-top-color: var(--amber); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════
       LIBRARY
    ════════════════════════════════ */
    #library { background: var(--bg); position: relative; }

    .lib-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 20px 12px;
      gap: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .lib-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 400;
      color: var(--cream);
      line-height: 1.1;
    }
    .lib-count {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 4px;
    }
    .lib-search-row { padding: 8px 20px; display: flex; gap: 8px; border-bottom: 1px solid var(--border-subtle); }
    .search-input {
      flex: 1;
      height: 38px;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 0 14px;
      font-size: .875rem;
      color: var(--cream);
      outline: none;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--amber-dim); }
    .filter-btn {
      flex-shrink: 0;
      height: 38px;
      width: 40px;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .fl-lines { display: flex; flex-direction: column; gap: 3px; }
    .fl { height: 1.5px; background: var(--muted); border-radius: 1px; }
    .fl1 { width: 13px; } .fl2 { width: 9px; } .fl3 { width: 5px; }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 8px 20px 12px;
      border-bottom: 1px solid var(--border-subtle);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      font-size: 11px;
      font-weight: 400;
      height: 28px;
      padding: 0 13px;
      border-radius: 14px;
      border: 1px solid var(--border-subtle);
      background: var(--surface);
      color: var(--muted);
      white-space: nowrap;
      cursor: pointer;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
    }
    .filter-chip.active { background: var(--amber); border-color: var(--amber); color: #000; }

    /* Recipe list */
    #recipe-list { padding-bottom: 100px; }

    .recipe-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border-subtle);
      background: none;
      color: inherit;
      text-align: left;
      width: 100%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .12s;
    }
    .recipe-card:active { background: var(--surface); }

    .card-swatch {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-family: var(--font-display); font-size: 14px; font-weight: 400; color: var(--cream); line-height: 1.3; }
    .annotated-badge {
      font-size: 7px;
      font-weight: 400;
      color: var(--amber-light);
      background: rgba(201,147,58,0.12);
      border: 1px solid rgba(201,147,58,0.2);
      border-radius: 3px;
      padding: 1px 4px;
      margin-top: 2px;
      display: inline-block;
    }
    .card-desc { font-size: .8rem; color: var(--cream-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .card-chevron { color: var(--muted); font-size: 18px; flex-shrink: 0; }

    .tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--amber-light);
      background: rgba(201,147,58,0.12);
      border: 1px solid rgba(201,147,58,0.2);
      border-radius: 4px;
      padding: 2px 6px;
    }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 30px; text-align: center; color: var(--muted); gap: 8px; }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .empty-state h3 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 400; color: var(--cream-dim); }
    .empty-state p { font-size: .9rem; }

    /* FAB */
    .fab {
      position: absolute;
      bottom: 62px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--amber);
      color: #1a1200;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 16px rgba(201,147,58,0.3);
      z-index: 10;
    }

    /* Bottom nav */
    .bottom-nav {
      height: 60px;
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: stretch;
    }
    .nav-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active { color: var(--amber); }

    /* ════════════════════════════════
       DETAIL
    ════════════════════════════════ */
    #detail { background: var(--bg); }

    .detail-header { flex-shrink: 0; }

    .detail-nav {
      display: flex;
      align-items: center;
      padding: 14px 20px 8px;
    }
    .detail-back {
      font-size: 13px;
      font-weight: 500;
      color: var(--amber);
    }

    .detail-header-title {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 400;
      color: var(--cream);
      line-height: 1.15;
      padding: 0 20px 16px;
    }

    .amber-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--amber-dim), transparent);
      margin: 0 20px 0;
      flex-shrink: 0;
    }

    #detail-content { padding: 20px 20px 0; }
    .detail-desc { font-size: .9rem; color: var(--cream-dim); margin-bottom: 12px; line-height: 1.5; }
    .detail-byline {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .detail-byline .sep { color: var(--amber-dim); margin: 0 5px; }
    .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }

    .detail-section { margin-bottom: 14px; }
    .section-label {
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--amber);
      margin-bottom: 8px;
    }
    .section-label-dim { color: var(--amber-dim); }

    /* Servings control */
    .servings-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 7px 12px;
      margin-bottom: 12px;
    }
    .servings-label { font-size: .85rem; color: var(--cream-dim); }
    .servings-btns { display: flex; align-items: center; gap: 14px; }
    .servings-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border);
      color: var(--amber);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .servings-count { font-family: var(--font-display); font-size: 16px; color: var(--cream); min-width: 24px; text-align: center; }

    /* Ingredients */
    .ingredient-list { list-style: none; }
    .ingredient-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border-subtle);
      flex-wrap: nowrap;
    }
    .ingredient-item:last-child { border-bottom: none; }
    .ingredient-qty { font-family: var(--font-display); font-style: italic; font-size: 12px; color: var(--amber-light); min-width: 30px; text-align: right; flex-shrink: 0; }
    .ingredient-unit { font-size: 12px; color: var(--amber-light); flex-shrink: 0; }
    .ingredient-name { font-size: 12px; color: var(--cream); flex: 1; }
    .ingredient-prep { font-size: 10px; color: var(--muted); font-style: italic; white-space: nowrap; }

    /* Steps */
    .step-list { list-style: none; }
    .step-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
    .step-item:last-child { border-bottom: none; }
    .step-num { font-family: var(--font-display); font-style: italic; font-size: 20px; color: var(--amber-dim); flex-shrink: 0; min-width: 16px; line-height: 1; }
    .step-text { font-size: 12px; color: var(--cream-dim); line-height: 1.6; padding-top: 2px; }

    /* Annotations */
    .annotation-panel {
      background: rgba(201,147,58,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .annotation-panel .section-label { margin-bottom: 5px; }
    .annotation-item { margin-bottom: 12px; }
    .annotation-date { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--amber-dim); margin-bottom: 3px; }
    .annotation-text { font-family: var(--font-display); font-style: italic; font-size: 12px; color: var(--amber-light); line-height: 1.5; }
    .annotation-empty { font-family: var(--font-display); font-style: italic; font-size: 12px; color: var(--muted); }
    .annotation-form { display: flex; gap: 8px; margin-top: 12px; }
    .annotation-form input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: .85rem;
      color: var(--cream);
      outline: none;
    }
    .annotation-form input::placeholder { color: var(--muted); }
    .annotation-form input:focus { border-color: var(--amber-dim); }

    /* Detail sticky footer */
    .detail-sticky-footer {
      flex-shrink: 0;
      padding: 10px 20px 12px;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg);
    }
    .btn-cook {
      width: 100%;
      background: var(--amber);
      color: #1a1200;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .detail-footer-actions { display: flex; gap: 8px; justify-content: center; }
    .btn-ghost-sm {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
    }
    .btn-ghost-sm:active { color: var(--amber); border-color: var(--amber-dim); }
    .btn-ghost-sm.danger { color: #c0392b; border-color: rgba(192,57,43,0.3); }

    /* ════════════════════════════════
       COOK MODE
    ════════════════════════════════ */
    #cook { background: var(--bg); }

    .cook-status-bar { height: 22px; display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; }
    .awake-pill {
      display: none;
      font-size: 9px;
      font-weight: 500;
      color: var(--amber);
      background: rgba(201,147,58,0.12);
      border: 1px solid rgba(201,147,58,0.2);
      border-radius: 20px;
      padding: 2px 8px;
    }
    .awake-pill.visible { display: block; }

    .cook-header { display: flex; align-items: flex-start; gap: 12px; padding: 4px 16px 8px; flex-shrink: 0; }
    .cook-exit { font-size: 12px; font-weight: 500; color: var(--amber); flex-shrink: 0; padding-top: 2px; }
    .cook-header-info { flex: 1; min-width: 0; }
    .cook-title { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cook-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .scale-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 20px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }
    .scale-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .scale-controls { display: flex; align-items: center; gap: 12px; }
    .scale-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      color: var(--amber);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .scale-count { font-family: var(--font-display); font-size: 18px; color: var(--cream); min-width: 28px; text-align: center; }

    /* Split layout */
    .content-area { flex: 1; display: flex; overflow: hidden; }

    .ing-panel {
      width: 110px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .2s ease;
    }
    .ing-panel.collapsed { width: 28px; }

    .ing-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px 6px;
      cursor: pointer;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .ing-panel.collapsed .ing-panel-header { display: none; }

    .ing-panel-label { font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--amber); }
    .ing-panel-chevron { font-size: 11px; color: var(--amber); }

    .ing-panel-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .ing-panel-body::-webkit-scrollbar { display: none; }
    .ing-panel.collapsed .ing-panel-body { display: none; }

    .ing-panel-collapsed-label {
      display: none;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--amber-dim);
      margin: auto;
      padding: 12px 0;
      cursor: pointer;
    }
    .ing-panel.collapsed .ing-panel-collapsed-label { display: block; }

    .cook-ing-item { padding: 6px 10px; border-bottom: 1px solid var(--border-subtle); }
    .cook-ing-qty { font-family: var(--font-display); font-style: italic; font-size: 10px; color: var(--amber-light); line-height: 1.4; }
    .cook-ing-name { font-size: 9px; color: var(--cream); }
    .cook-ing-note { font-size: 8px; color: var(--muted); font-style: italic; }

    .steps-panel { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 14px; }

    .active-step-card {
      background: rgba(201,147,58,0.07);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .cook-steps-label {
      font-size: 8px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--amber); margin-bottom: 6px;
    }
    .step-counter { font-family: var(--font-display); font-style: italic; font-size: 9px; color: var(--amber); margin-bottom: 8px; }
    .active-step-text { font-size: 13px; color: var(--cream); line-height: 1.6; }

    .up-next-label { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; }

    .future-step { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; opacity: .6; }
    .future-step-num { font-family: var(--font-display); font-style: italic; font-size: 18px; color: var(--amber-dim); flex-shrink: 0; line-height: 1.2; }
    .future-step-text { font-size: 10px; color: var(--muted); line-height: 1.5; padding-top: 3px; }

    /* Progress dots */
    .progress-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 6px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      background: var(--surface);
    }
    .progress-dots::-webkit-scrollbar { display: none; }
    .progress-dots .dot { border-radius: 4px; height: 4px; flex-shrink: 0; transition: all .2s; }
    .progress-dots .dot.active { width: 14px; background: var(--amber); }
    .progress-dots .dot.done { width: 4px; background: var(--amber-dim); }
    .progress-dots .dot.future { width: 4px; background: rgba(255,255,255,0.07); }

    /* Step nav */
    .step-nav {
      display: flex; gap: 8px; padding: 8px 20px 12px; flex-shrink: 0;
      background: var(--surface); border-top: 1px solid var(--border-subtle);
    }
    .step-nav-back {
      flex: 1;
      padding: 9px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      transition: opacity .15s;
    }
    .step-nav-next {
      flex: 2;
      padding: 9px;
      background: var(--amber);
      border-radius: var(--radius);
      color: #1a1200;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      letter-spacing: .02em;
    }

    /* ════════════════════════════════
       FORM
    ════════════════════════════════ */
    #form-view { background: var(--bg); }

    .form-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .form-back { font-size: 13px; font-weight: 500; color: var(--amber); }
    .form-header h1 { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: var(--cream); }

    .form-body { padding: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .9rem;
      color: var(--cream);
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--amber-dim); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
    .form-textarea { resize: vertical; min-height: 72px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    /* Tag input */
    .tag-input-area {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 8px 12px;

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://zbyhtcsccjvmhvswlzbg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpieWh0Y3NjY2p2bWh2c3dsemJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTA0MzksImV4cCI6MjA5MDU2NjQzOX0.QxnLcNfeOkbf-vp1utN_461vhq3693Bzngn4av-Aemo';

// ═══════════════════════════════════════════════════════
//  SUPABASE CLIENT
// ═══════════════════════════════════════════════════════
const api = {
  async req(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer || 'return=representation',
        ...opts.headers,
      },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    if (res.status === 204) return null;
    return res.json();
  },
  get(path, params = {}) {
    const q = new URLSearchParams(params).toString();
    return this.req(`${path}${q ? '?' + q : ''}`);
  },
  post(path, body) {
    return this.req(path, { method: 'POST', body: JSON.stringify(body) });
  },
  patch(path, body) {
    return this.req(path, { method: 'PATCH', body: JSON.stringify(body), prefer: 'return=representation' });
  },
  delete(path) {
    return this.req(path, { method: 'DELETE', prefer: '' });
  },
};

// ═══════════════════════════════════════════════════════
//  EMOJI SWATCH MAP
// ═══════════════════════════════════════════════════════
const SWATCH_MAP = [
  { tags: ['italian','pasta','pizza'],                         emoji: '🍝', bg: '#2a1f0e' },
  { tags: ['soup','stock','broth'],                            emoji: '🍲', bg: '#0e1f1a' },
  { tags: ['baking','bread','focaccia','rolls'],               emoji: '🍞', bg: '#2a200e' },
  { tags: ['dessert','cake','cookies','muffins','biscuits'],   emoji: '🧁', bg: '#1e1428' },
  { tags: ['salad','garden','vegetarian'],                     emoji: '🥗', bg: '#1a1a0e' },
  { tags: ['mexican','carnitas'],                              emoji: '🌮', bg: '#2a1a0e' },
  { tags: ['preserved','jam'],                                 emoji: '🫙', bg: '#1a1528' },
  { tags: ['breakfast','yogurt','pancakes'],                   emoji: '🍳', bg: '#1a1510' },
  { tags: ['thanksgiving'],                                    emoji: '🦃', bg: '#1a1a12' },
];
const DEFAULT_SWATCH = { emoji: '🍽️', bg: '#1a1917' };

function getRecipeSwatch(recipe) {
  const recipeTags = (recipe.tags || []).map(t => t.toLowerCase());
  for (const entry of SWATCH_MAP) {
    if (entry.tags.some(t => recipeTags.includes(t))) {
      return { emoji: entry.emoji, bg: entry.bg };
    }
  }
  return DEFAULT_SWATCH;
}

// ═══════════════════════════════════════════════════════

function showView(id) {

  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function toast(msg, duration = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════════
//  FRACTION DISPLAY
// ═══════════════════════════════════════════════════════
const FRACS = {
  0.25: '¼', 0.5: '½', 0.75: '¾',
  0.125: '⅛', 0.375: '⅜', 0.625: '⅝', 0.875: '⅞',
  0.333: '⅓', 0.667: '⅔',
};
function formatQty(n) {
  if (n == null) return '';
  const whole = Math.floor(n);
  const dec = Math.round((n - whole) * 1000) / 1000;
  const frac = FRACS[Math.round(dec * 1000) / 1000];
  if (dec === 0) return String(whole || '');
  if (frac) return whole ? `${whole}${frac}` : frac;
  return n % 1 === 0 ? String(n) : n.toFixed(2).replace(/\.?0+$/, '');
}

function scaleQty(qty, base, current) {
  if (qty == null) return null;
  return (qty / base) * current;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtTime(mins) {
  if (!mins) return '';
  if (mins < 60) return `${mins} min`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `${h} hr ${m} min` : `${h} hr`;
}

// ═══════════════════════════════════════════════════════
//  LIBRARY
// ═══════════════════════════════════════════════════════
async function loadRecipes() {
  try {
    const recipes = await api.get('recipes?select=*,annotations(id)&order=created_at.desc');
    state.recipes = recipes || [];
    buildFilterBar();
    renderLibrary();
  } catch (e) {
    document.getElementById('recipe-list').innerHTML =
      `<div class="empty-state"><p>Error loading recipes: ${esc(e.message)}</p></div>`;
  }
}

function buildFilterBar() {
  const tags = new Set();
  state.recipes.forEach(r => (r.tags || []).forEach(t => tags.add(t)));
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `<button class="filter-chip ${state.filterTag === 'all' ? 'active' : ''}" data-filter="all">All</button>`;
  [...tags].sort().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = `filter-chip${state.filterTag === tag ? ' active' : ''}`;
    btn.dataset.filter = tag;
    btn.textContent = tag;
    bar.appendChild(btn);
  });
}

function getFilteredSorted() {
  let list = [...state.recipes];

  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    list = list.filter(r =>
      r.title.toLowerCase().includes(q) ||
      (r.description || '').toLowerCase().includes(q) ||
      (r.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  if (state.filterTag !== 'all') {
    list = list.filter(r => (r.tags || []).includes(state.filterTag));
  }

  switch (state.sortMode) {
    case 'created_desc': list.sort((a, b) => b.created_at.localeCompare(a.created_at)); break;
    case 'created_asc':  list.sort((a, b) => a.created_at.localeCompare(b.created_at)); break;
    case 'alpha':        list.sort((a, b) => a.title.localeCompare(b.title)); break;
    case 'alpha_desc':   list.sort((a, b) => b.title.localeCompare(a.title)); break;
    case 'cooked':       list.sort((a, b) => {
      if (!a.last_cooked_at && !b.last_cooked_at) return 0;
      if (!a.last_cooked_at) return 1;
      if (!b.last_cooked_at) return -1;
      return b.last_cooked_at.localeCompare(a.last_cooked_at);
    }); break;
  }

  return list;
}

function renderLibrary() {
  const list = getFilteredSorted();
  const el = document.getElementById('recipe-list');
  document.getElementById('recipe-count').textContent =
    `${list.length} recipe${list.length !== 1 ? 's' : ''}`;

  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🍽️</div>
      <h3>${state.recipes.length === 0 ? 'No recipes yet' : 'No matches'}</h3>
      <p>${state.recipes.length === 0 ? 'Tap + to add your first recipe.' : 'Try a different search or filter.'}</p>
    </div>`;
    return;
  }

  el.innerHTML = '';
  list.forEach(r => {
    const swatch = getRecipeSwatch(r);
    const hasAnnotations = (r.annotations || []).length > 0;
    const card = document.createElement('button');
    card.className = 'recipe-card';
    card.dataset.id = r.id;

    const meta = [];
    if (r.tags && r.tags.length) meta.push(esc(r.tags[0]));
    if (r.prep_time_minutes || r.cook_time_minutes) {
      const total = (r.prep_time_minutes || 0) + (r.cook_time_minutes || 0);
      meta.push(fmtTime(total));
    }
    if (r.last_cooked_at) meta.push(fmtDate(r.last_cooked_at));

    card.innerHTML = `
      <div class="card-swatch" style="background:${swatch.bg}">${swatch.emoji}</div>
      <div class="card-info">
        <div class="card-title">${esc(r.title)}</div>
        ${meta.length ? `<div class="card-meta">${meta.join('  ·  ')}</div>` : ''}
        ${hasAnnotations ? '<div class="annotated-badge">Annotated</div>' : ''}
      </div>
      <div class="card-chevron">›</div>
    `;
    card.addEventListener('click', () => openDetail(r.id));
    el.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
//  RECIPE DETAIL
// ═══════════════════════════════════════════════════════
async function openDetail(id) {
  showView('detail');
  document.getElementById('detail-content').innerHTML =
    '<div class="loading"><div class="spinner"></div> Loading…</div>';

  try {
    const [recipe, ingredients, steps, annotations] = await Promise.all([
      api.get(`recipes?id=eq.${id}&select=*`).then(r => r[0]),
      api.get(`ingredients?recipe_id=eq.${id}&select=*&order=sort_order.asc`),
      api.get(`steps?recipe_id=eq.${id}&select=*&order=sort_order.asc`),
      api.get(`annotations?recipe_id=eq.${id}&select=*&order=created_at.asc`),
    ]);

    state.currentRecipe = recipe;
    state.currentIngredients = ingredients || [];
    state.currentSteps = steps || [];
    state.currentAnnotations = annotations || [];
    state.detailServings = recipe.base_servings || 4;

    renderDetail();
  } catch (e) {
    document.getElementById('detail-content').innerHTML =
      `<div class="empty-state"><p>Error: ${esc(e.message)}</p></div>`;
  }
}

function renderDetail() {
  const r = state.currentRecipe;
  const ingredients = state.currentIngredients;
  const steps = state.currentSteps;
  const annotations = state.currentAnnotations;
  const servings = state.detailServings;
  const base = r.base_servings || 1;

  // Byline
  const bylineParts = [];
  if (r.prep_time_minutes) bylineParts.push(`Prep ${r.prep_time_minutes}m`);
  if (r.cook_time_minutes) bylineParts.push(`Cook ${r.cook_time_minutes}m`);
  if (r.prep_time_minutes && r.cook_time_minutes)
    bylineParts.push(`Total ${r.prep_time_minutes + r.cook_time_minutes}m`);
  if (r.source_url) {
    try { bylineParts.push(new URL(r.source_url).hostname); } catch (_) {}
  }
  const bylineHTML = bylineParts.join('<span class="sep">·</span>');

  // Ingredients (scaled)
  const ingHTML = ingredients.map(i => {
    const scaled = scaleQty(i.quantity, base, servings);
    return `<li class="ingredient-item">
      <span class="ingredient-qty">${i.quantity != null ? esc(formatQty(scaled)) : ''}</span>
      ${i.unit ? `<span class="ingredient-unit">${esc(i.unit)}</span>` : ''}
      <span class="ingredient-name">${esc(i.name)}</span>
      ${i.prep_note ? `<span class="ingredient-prep">, ${esc(i.prep_note)}</span>` : ''}
    </li>`;
  }).join('');

  document.getElementById('detail-header-title').textContent = r.title;

  document.getElementById('detail-content').innerHTML = `
    ${r.description ? `<div class="detail-desc">${esc(r.description)}</div>` : ''}
    ${bylineHTML ? `<div class="detail-byline">${bylineHTML}</div>` : ''}
    ${r.tags && r.tags.length ? `<div class="detail-tags">${r.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}

    ${ingredients.length ? `
      <div class="detail-section">
        <div class="section-label">Ingredients</div>
        <div class="servings-control">
          <span class="servings-label">Servings</span>
          <div class="servings-btns">
            <button class="servings-btn" id="detail-serving-down">−</button>
            <span class="servings-count">${servings}</span>
            <button class="servings-btn" id="detail-serving-up">+</button>
          </div>
        </div>
        <ul class="ingredient-list">${ingHTML}</ul>
      </div>
    ` : ''}

    ${steps.length ? `
      <div class="detail-section">
        <div class="section-label">Method</div>
        <ol class="step-list">
          ${steps.map((s, i) => `<li class="step-item">
            <span class="step-num">${i + 1}</span>
            <span class="step-text">${esc(s.content)}</span>
          </li>`).join('')}
        </ol>
      </div>
    ` : ''}

    <div class="detail-section">
      <div class="annotation-panel">
        <div class="section-label section-label-dim">Your Notes</div>
        <div id="annotation-list">
          ${annotations.length
            ? annotations.map(a => `
              <div class="annotation-item" data-id="${a.id}">
                <div class="annotation-date">${fmtDate(a.created_at)}</div>
                <div class="annotation-text">${esc(a.content)}</div>
              </div>`).join('')
            : '<div class="annotation-empty">No notes yet.</div>'}
        </div>
        <div class="annotation-form">
          <input type="text" id="annotation-input" placeholder="Add a note…">
          <button class="btn btn-primary btn-sm" id="annotation-submit">Add</button>
        </div>
      </div>
    </div>
    <div style="height:20px"></div>
  `;

  // Servings controls
  if (ingredients.length) {
    document.getElementById('detail-serving-down').addEventListener('click', () => {
      state.detailServings = Math.max(state.detailServings - 1, 1);
      renderDetail();
    });
    document.getElementById('detail-serving-up').addEventListener('click', () => {
      state.detailServings = Math.min(state.detailServings + 1, 99);
      renderDetail();
    });
  }

  // Annotation submit
  document.getElementById('annotation-submit').addEventListener('click', addAnnotation);
  document.getElementById('annotation-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addAnnotation();
  });
}

async function addAnnotation() {
  const input = document.getElementById('annotation-input');
  const content = input.value.trim();
  if (!content) return;
  try {
    const [a] = await api.post('annotations', { recipe_id: state.currentRecipe.id, content });
    state.currentAnnotations.push(a);
    input.value = '';
    renderDetail();
    toast('Note added');
  } catch (e) {
    toast('Error saving note');
  }
}

async function deleteRecipe() {
  if (!state.currentRecipe) return;
  if (!confirm(`Delete "${state.currentRecipe.title}"? This cannot be undone.`)) return;
  try {
    await api.delete(`recipes?id=eq.${state.currentRecipe.id}`);
    state.recipes = state.recipes.filter(r => r.id !== state.currentRecipe.id);
    state.currentRecipe = null;
    renderLibrary();
    showView('library');
    toast('Recipe deleted');
  } catch (e) {
    toast('Error deleting recipe');
  }
}

// ═══════════════════════════════════════════════════════
//  COOK MODE
// ═══════════════════════════════════════════════════════
async function openCookMode() {
  const r = state.currentRecipe;
  state.cookServings = state.detailServings;
  state.cookStep = 0;
  state.ingPanelCollapsed = false;

  document.getElementById('cook-title').textContent = r.title;
  const metaParts = [];
  if (r.prep_time_minutes) metaParts.push(`Prep ${r.prep_time_minutes}m`);
  if (r.cook_time_minutes) metaParts.push(`Cook ${r.cook_time_minutes}m`);
  document.getElementById('cook-meta').textContent = metaParts.join(' · ');

  renderCookMode();
  showView('cook');
  await acquireWakeLock();

  try {
    await api.patch(`recipes?id=eq.${r.id}`, { last_cooked_at: new Date().toISOString() });
    const idx = state.recipes.findIndex(x => x.id === r.id);
    const now = new Date().toISOString();
    if (idx !== -1) state.recipes[idx].last_cooked_at = now;
    state.currentRecipe.last_cooked_at = now;
  } catch (_) {}
}

function renderCookMode() {
  const r = state.currentRecipe;
  const base = r.base_servings || 1;
  const current = state.cookServings;
  const steps = state.currentSteps;
  const stepIdx = state.cookStep;
  const collapsed = state.ingPanelCollapsed;

  // Scale count
  document.getElementById('scale-count').textContent = current;

  // Panel collapse state
  const panel = document.getElementById('ing-panel');
  panel.classList.toggle('collapsed', collapsed);
  document.getElementById('ing-panel-chevron').textContent = collapsed ? '›' : '‹';

  // Ingredient panel
  document.getElementById('ing-panel-body').innerHTML =
    state.currentIngredients.map(i => {
      const scaled = scaleQty(i.quantity, base, current);
      const qtyStr = i.quantity != null ? `${esc(formatQty(scaled))} ${esc(i.unit || '')}`.trim() : esc(i.unit || '');
      return `<div class="cook-ing-item">
        <div class="cook-ing-qty">${qtyStr}</div>
        <div class="cook-ing-name">${esc(i.name)}</div>
        ${i.prep_note ? `<div class="cook-ing-note">${esc(i.prep_note)}</div>` : ''}
      </div>`;
    }).join('');

  // Steps panel
  const stepsPanel = document.getElementById('steps-panel');
  if (steps.length === 0) {
    stepsPanel.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:.85rem;text-align:center;font-style:italic">No steps recorded.</div>';
    document.getElementById('progress-dots').innerHTML = '';
    document.getElementById('step-nav').style.display = 'none';
    return;
  }
  document.querySelector('.step-nav').style.display = '';

  let html = '<div class="cook-steps-label">Method</div>';
  const step = steps[stepIdx];
  if (step) {
    html += `<div class="active-step-card">
      <div class="step-counter">Step ${stepIdx + 1} of ${steps.length}</div>
      <div class="active-step-text">${esc(step.content)}</div>
    </div>`;
  }

  const futureSteps = steps.slice(stepIdx + 1, stepIdx + 3);
  if (futureSteps.length) {
    html += `<div class="up-next-label">Up next</div>`;
    futureSteps.forEach((s, fi) => {
      html += `<div class="future-step">
        <span class="future-step-num">${stepIdx + fi + 2}</span>
        <span class="future-step-text">${esc(s.content)}</span>
      </div>`;
    });
  }
  stepsPanel.innerHTML = html;

  // Progress dots
  document.getElementById('progress-dots').innerHTML =
    steps.map((_, i) => {
      const cls = i < stepIdx ? 'dot done' : i === stepIdx ? 'dot active' : 'dot future';
      return `<div class="${cls}"></div>`;
    }).join('');

  // Nav buttons
  document.getElementById('cook-back-step').style.opacity = stepIdx === 0 ? '0.3' : '1';
  document.getElementById('cook-next-step').textContent =
    stepIdx === steps.length - 1 ? 'Done ✓' : 'Next →';
}

// ═══════════════════════════════════════════════════════
//  WAKE LOCK
// ═══════════════════════════════════════════════════════
function updateAwakePill() {
  const pill = document.getElementById('awake-pill');
  if (pill) pill.classList.toggle('visible', state.wakeLock !== null);
}

async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      state.wakeLock = await navigator.wakeLock.request('screen');
      updateAwakePill();
    } catch (_) {}
  }
}

function releaseWakeLock() {
  if (state.wakeLock) {
    state.wakeLock.release().catch(() => {});
    state.wakeLock = null;
    updateAwakePill();
  }
}

// ═══════════════════════════════════════════════════════
//  FORM (ADD / EDIT)
// ═══════════════════════════════════════════════════════
function openForm(recipe = null) {
  state.editingId = recipe ? recipe.id : null;
  document.getElementById('form-title').textContent = recipe ? 'Edit Recipe' : 'New Recipe';

  document.getElementById('f-title').value = recipe?.title || '';
  document.getElementById('f-desc').value = recipe?.description || '';
  document.getElementById('f-servings').value = recipe?.base_servings || 4;
  document.getElementById('f-prep').value = recipe?.prep_time_minutes || '';
  document.getElementById('f-cook').value = recipe?.cook_time_minutes || '';
  document.getElementById('f-source').value = recipe?.source_url || '';

  formState.tags = recipe ? [...(recipe.tags || [])] : [];
  renderTagPills();

  formState.ingredients = recipe
    ? state.currentIngredients.map(i => ({ ...i }))
    : [blankIngredient()];
  renderIngredientEditor();

  formState.steps = recipe
    ? state.currentSteps.map(s => ({ ...s }))
    : [blankStep()];
  renderStepEditor();

  showView('form-view');
}

const formState = { tags: [], ingredients: [], steps: [] };

function blankIngredient() {
  return { id: null, quantity: '', unit: '', name: '', prep_note: '', sort_order: 0 };
}
function blankStep() {
  return { id: null, content: '', sort_order: 0 };
}

function renderTagPills() {
  const area = document.getElementById('tag-input-area');
  const input = document.getElementById('tag-bare-input');
  area.querySelectorAll('.tag-pill').forEach(el => el.remove());
  formState.tags.forEach((tag, i) => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `${esc(tag)}<button type="button" class="tag-pill-remove" data-i="${i}">×</button>`;
    area.insertBefore(pill, input);
  });
}

function addTag(val) {
  const tag = val.trim().toLowerCase();
  if (tag && !formState.tags.includes(tag)) {
    formState.tags.push(tag);
    renderTagPills();
  }
}

function renderIngredientEditor() {
  const editor = document.getElementById('ingredient-editor');
  editor.innerHTML = '';
  formState.ingredients.forEach((ing, i) => {
    const row = document.createElement('div');
    row.className = 'ingredient-row';
    row.innerHTML = `
      <input class="qty-input" type="number" placeholder="Qty" min="0" step="any" value="${esc(ing.quantity)}" data-field="quantity" data-i="${i}">
      <input class="unit-input" type="text" placeholder="Unit" value="${esc(ing.unit || '')}" data-field="unit" data-i="${i}">
      <input class="name-input" type="text" placeholder="Ingredient *" value="${esc(ing.name)}" data-field="name" data-i="${i}">
      <input class="prep-input" type="text" placeholder="Prep note" value="${esc(ing.prep_note || '')}" data-field="prep_note" data-i="${i}">
      <button type="button" class="remove-btn" data-i="${i}">×</button>
    `;
    editor.appendChild(row);
  });
}

function renderStepEditor() {
  const editor = document.getElementById('step-editor');
  editor.innerHTML = '';
  formState.steps.forEach((step, i) => {
    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `
      <div class="step-number">${i + 1}</div>
      <textarea placeholder="Describe this step…" data-i="${i}">${esc(step.content)}</textarea>
      <button type="button" class="remove-btn" data-i="${i}">×</button>
    `;
    editor.appendChild(row);
  });
}

async function saveForm() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Title is required'); return; }

  const recipeData = {
    title,
    description: document.getElementById('f-desc').value.trim() || null,
    base_servings: parseInt(document.getElementById('f-servings').value) || 4,
    prep_time_minutes: parseInt(document.getElementById('f-prep').value) || null,
    cook_time_minutes: parseInt(document.getElementById('f-cook').value) || null,
    source_url: document.getElementById('f-source').value.trim() || null,
    source_type: state.editingId ? state.currentRecipe?.source_type : 'manual',
    tags: formState.tags,
    updated_at: new Date().toISOString(),
  };

  try {
    const saveBtn = document.getElementById('form-save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';

    let recipeId;

    if (state.editingId) {
      recipeId = state.editingId;
      await api.patch(`recipes?id=eq.${recipeId}`, recipeData);
      await Promise.all([
        api.delete(`ingredients?recipe_id=eq.${recipeId}`),
        api.delete(`steps?recipe_id=eq.${recipeId}`),
      ]);
    } else {
      const [rec] = await api.post('recipes', recipeData);
      recipeId = rec.id;
    }

    const validIngredients = formState.ingredients
      .filter(i => i.name.trim())
      .map((i, idx) => ({
        recipe_id: recipeId,
        sort_order: idx,
        quantity: i.quantity !== '' ? parseFloat(i.quantity) : null,
        unit: i.unit.trim() || null,
        name: i.name.trim(),
        prep_note: i.prep_note.trim() || null,
      }));

    const validSteps = formState.steps
      .filter(s => s.content.trim())
      .map((s, idx) => ({ recipe_id: recipeId, sort_order: idx, content: s.content.trim() }));

    await Promise.all([
      validIngredients.length ? api.post('ingredients', validIngredients) : Promise.resolve(),
      validSteps.length ? api.post('steps', validSteps) : Promise.resolve(),
    ]);

    toast(state.editingId ? 'Recipe updated!' : 'Recipe saved!');
    await loadRecipes();

    if (state.editingId) {
      await openDetail(recipeId);
    } else {
      showView('library');
    }
  } catch (e) {
    toast(`Error: ${e.message}`);
  } finally {
    const saveBtn = document.getElementById('form-save-btn');
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Recipe';
  }
}

// ═══════════════════════════════════════════════════════
//  SORT SHEET
// ═══════════════════════════════════════════════════════
function openSortSheet() {
  const SORTS = [
    { value: 'created_desc', label: 'Newest first' },
    { value: 'created_asc',  label: 'Oldest first' },
    { value: 'alpha',        label: 'A – Z' },
    { value: 'alpha_desc',   label: 'Z – A' },
    { value: 'cooked',       label: 'Recently cooked' },
  ];
  const el = document.getElementById('sort-content');
  el.innerHTML = SORTS.map(s =>
    `<button class="sort-option${state.sortMode === s.value ? ' active' : ''}" data-sort="${s.value}">${esc(s.label)}</button>`
  ).join('');
  el.querySelectorAll('.sort-option').forEach(btn => {
    btn.addEventListener('click', () => {
      state.sortMode = btn.dataset.sort;
      renderLibrary();
      document.getElementById('sort-overlay').classList.remove('open');
    });
  });
  document.getElementById('sort-overlay').classList.add('open');
}

// ═══════════════════════════════════════════════════════
//  SHOPPING LIST
// ═══════════════════════════════════════════════════════
function openShoppingList() {
  const r = state.currentRecipe;
  document.getElementById('shop-serving-label').textContent = `${r.base_servings || 4} servings`;

  const items = state.currentIngredients.map(i => ({
    text: [formatQty(i.quantity), i.unit, i.name, i.prep_note ? `(${i.prep_note})` : '']
      .filter(Boolean).join(' '),
  }));

  const content = document.getElementById('shop-content');
  if (!items.length) {
    content.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center">No ingredients.</div>';
  } else {
    content.innerHTML = items.map((item, i) => `
      <div class="shopping-item" data-i="${i}">
        <div class="shopping-check"></div>
        <div class="shopping-text">${esc(item.text)}</div>
      </div>`).join('');
    content.querySelectorAll('.shopping-item').forEach(el => {
      el.addEventListener('click', () => {
        el.classList.toggle('checked');
        el.querySelector('.shopping-check').textContent =
          el.classList.contains('checked') ? '✓' : '';
      });
    });
  }

  document.getElementById('shop-overlay').classList.add('open');
}

function copyShoppingList() {
  const items = [...document.querySelectorAll('.shopping-item')]
    .map(el => el.querySelector('.shopping-text').textContent);
  navigator.clipboard.writeText(items.join('\n')).then(() => toast('Copied!'));
}

// ═══════════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════════
function openExport() {
  document.getElementById('export-overlay').classList.add('open');
}

function exportPrint() {
  const r = state.currentRecipe;
  const html = `
    <div class="print-recipe">
      <h1>${esc(r.title)}</h1>
      ${r.description ? `<div class="print-desc">${esc(r.description)}</div>` : ''}
      <div class="print-meta">
        ${r.prep_time_minutes ? `<span>Prep: ${r.prep_time_minutes} min</span>` : ''}
        ${r.cook_time_minutes ? `<span>Cook: ${r.cook_time_minutes} min</span>` : ''}
        <span>Servings: ${r.base_servings}</span>
      </div>
      ${state.currentIngredients.length ? `
        <h2>Ingredients</h2>
        ${state.currentIngredients.map(i => `<div class="print-ingredient">
          <span class="print-qty">${esc(formatQty(i.quantity))}</span>
          <span class="print-unit">${esc(i.unit || '')}</span>
          <span>${esc(i.name)}${i.prep_note ? `, <em>${esc(i.prep_note)}</em>` : ''}</span>
        </div>`).join('')}` : ''}
      ${state.currentSteps.length ? `
        <h2>Steps</h2>
        ${state.currentSteps.map((s, i) => `<div class="print-step">
          <span class="print-step-num">${i + 1}.</span>
          <span>${esc(s.content)}</span>
        </div>`).join('')}` : ''}
      ${state.currentAnnotations.length ? `
        <div class="print-annotations">
          <h2>Your Notes</h2>
          ${state.currentAnnotations.map(a => `<div class="print-annotation">
            <strong>${fmtDate(a.created_at)}</strong> — ${esc(a.content)}
          </div>`).join('')}
        </div>` : ''}
      ${r.source_url ? `<div class="print-source">Source: ${esc(r.source_url)}</div>` : ''}
    </div>`;

  document.getElementById('print-target').innerHTML = html;
  document.getElementById('export-overlay').classList.remove('open');
  window.print();
}

function exportJSON() {
  const data = {
    recipe: state.currentRecipe,
    ingredients: state.currentIngredients,
    steps: state.currentSteps,
    annotations: state.currentAnnotations,
    exported_at: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  dlBlob(blob, `${slugify(state.currentRecipe.title)}.json`);
  document.getElementById('export-overlay').classList.remove('open');
}

function exportText() {
  const r = state.currentRecipe;
  const lines = [r.title, ''];
  if (r.description) lines.push(r.description, '');
  const times = [];
  if (r.prep_time_minutes) times.push(`Prep: ${r.prep_time_minutes} min`);
  if (r.cook_time_minutes) times.push(`Cook: ${r.cook_time_minutes} min`);
  times.push(`Servings: ${r.base_servings}`);
  lines.push(times.join('  |  '), '');

  if (state.currentIngredients.length) {
    lines.push('INGREDIENTS', '');
    state.currentIngredients.forEach(i =>
      lines.push([formatQty(i.quantity), i.unit, i.name, i.prep_note].filter(Boolean).join(' '))
    );
    lines.push('');
  }

  if (state.currentSteps.length) {
    lines.push('STEPS', '');
    state.currentSteps.forEach((s, i) => lines.push(`${i + 1}. ${s.content}`));
    lines.push('');
  }

  if (state.currentAnnotations.length) {
    lines.push('YOUR NOTES', '');
    state.currentAnnotations.forEach(a => lines.push(`• ${a.content}`));
  }

  dlBlob(new Blob([lines.join('\n')], { type: 'text/plain' }), `${slugify(r.title)}.txt`);
  document.getElementById('export-overlay').classList.remove('open');
}

function dlBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

// ═══════════════════════════════════════════════════════
//  EVENT WIRING
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {

  // ── Library ──
  document.getElementById('search-input').addEventListener('input', e => {
    state.searchQuery = e.target.value;
    renderLibrary();
  });

  document.getElementById('filter-bar').addEventListener('click', e => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    state.filterTag = chip.dataset.filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderLibrary();
  });

  document.getElementById('filter-sort-btn').addEventListener('click', openSortSheet);
  document.getElementById('sort-close').addEventListener('click', () => {
    document.getElementById('sort-overlay').classList.remove('open');
  });
  document.getElementById('sort-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('sort-overlay'))
      document.getElementById('sort-overlay').classList.remove('open');
  });

  document.getElementById('fab-add').addEventListener('click', () => openForm());

  // ── Bottom nav ──
  document.getElementById('bottom-nav').addEventListener('click', e => {
    const item = e.target.closest('.nav-item');
    if (!item) return;
    const nav = item.dataset.nav;
    state.activeNav = nav;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');

    if (nav === 'library') {
      showView('library');
    } else if (nav === 'import') {
      openForm(null);
    } else if (nav === 'recent') {
      state.sortMode = 'cooked';
      renderLibrary();
    }
  });

  // ── Detail ──
  document.getElementById('detail-back').addEventListener('click', () => showView('library'));
  document.getElementById('detail-delete-btn').addEventListener('click', deleteRecipe);
  document.getElementById('cook-btn').addEventListener('click', openCookMode);
  document.getElementById('shop-btn').addEventListener('click', openShoppingList);
  document.getElementById('export-btn').addEventListener('click', openExport);
  document.getElementById('edit-btn').addEventListener('click', () => openForm(state.currentRecipe));

  // ── Cook ──
  document.getElementById('cook-exit-btn').addEventListener('click', () => {
    releaseWakeLock();
    showView('detail');
    renderDetail();
  });

  document.getElementById('scale-up').addEventListener('click', () => {
    state.cookServings = Math.min(state.cookServings + 1, 99);
    renderCookMode();
  });
  document.getElementById('scale-down').addEventListener('click', () => {
    state.cookServings = Math.max(state.cookServings - 1, 1);
    renderCookMode();
  });

  document.getElementById('cook-next-step').addEventListener('click', () => {
    const steps = state.currentSteps;
    if (state.cookStep >= steps.length - 1) {
      releaseWakeLock();
      showView('detail');
      renderDetail();
    } else {
      state.cookStep++;
      renderCookMode();
    }
  });

  document.getElementById('cook-back-step').addEventListener('click', () => {
    if (state.cookStep > 0) {
      state.cookStep--;
      renderCookMode();
    }
  });

  document.getElementById('ing-panel-toggle').addEventListener('click', () => {
    state.ingPanelCollapsed = !state.ingPanelCollapsed;
    renderCookMode();
  });
  document.getElementById('ing-panel-toggle-collapsed').addEventListener('click', () => {
    state.ingPanelCollapsed = false;
    renderCookMode();
  });

  // ── Form ──
  document.getElementById('form-back').addEventListener('click', () => {
    if (state.editingId) { showView('detail'); } else { showView('library'); }
  });
  document.getElementById('form-cancel-btn').addEventListener('click', () => {
    if (state.editingId) { showView('detail'); } else { showView('library'); }
  });
  document.getElementById('form-save-btn').addEventListener('click', saveForm);
  document.getElementById('add-ingredient-btn').addEventListener('click', () => {
    formState.ingredients.push(blankIngredient());
    renderIngredientEditor();
  });
  document.getElementById('add-step-btn').addEventListener('click', () => {
    formState.steps.push(blankStep());
    renderStepEditor();
  });

  document.getElementById('ingredient-editor').addEventListener('input', e => {
    const inp = e.target;
    const i = parseInt(inp.dataset.i);
    if (isNaN(i)) return;
    formState.ingredients[i][inp.dataset.field] = inp.value;
  });
  document.getElementById('ingredient-editor').addEventListener('click', e => {
    const btn = e.target.closest('.remove-btn');
    if (!btn) return;
    formState.ingredients.splice(parseInt(btn.dataset.i), 1);
    if (!formState.ingredients.length) formState.ingredients.push(blankIngredient());
    renderIngredientEditor();
  });

  document.getElementById('step-editor').addEventListener('input', e => {
    const ta = e.target.closest('textarea');
    if (!ta) return;
    formState.steps[parseInt(ta.dataset.i)].content = ta.value;
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });
  document.getElementById('step-editor').addEventListener('click', e => {
    const btn = e.target.closest('.remove-btn');
    if (!btn) return;
    formState.steps.splice(parseInt(btn.dataset.i), 1);
    if (!formState.steps.length) formState.steps.push(blankStep());
    renderStepEditor();
  });

  document.getElementById('tag-bare-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addTag(e.target.value);
      e.target.value = '';
    } else if (e.key === 'Backspace' && !e.target.value && formState.tags.length) {
      formState.tags.pop();
      renderTagPills();
    }
  });
  document.getElementById('tag-input-area').addEventListener('click', e => {
    const btn = e.target.closest('.tag-pill-remove');
    if (btn) {
      formState.tags.splice(parseInt(btn.dataset.i), 1);
      renderTagPills();
    } else {
      document.getElementById('tag-bare-input').focus();
    }
  });

  // ── Shopping list ──
  document.getElementById('shop-close').addEventListener('click', () => {
    document.getElementById('shop-overlay').classList.remove('open');
  });
  document.getElementById('shop-copy-btn').addEventListener('click', copyShoppingList);
  document.getElementById('shop-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('shop-overlay'))
      document.getElementById('shop-overlay').classList.remove('open');
  });

  // ── Export ──
  document.getElementById('export-close').addEventListener('click', () => {
    document.getElementById('export-overlay').classList.remove('open');
  });
  document.getElementById('export-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('export-overlay'))
      document.getElementById('export-overlay').classList.remove('open');
  });
  document.getElementById('export-print').addEventListener('click', exportPrint);
  document.getElementById('export-json').addEventListener('click', exportJSON);
  document.getElementById('export-text').addEventListener('click', exportText);

  // ── Wake Lock re-acquire on visibility change ──
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' &&
        document.getElementById('cook').classList.contains('active')) {
      await acquireWakeLock();
    }
  });

  // ── Bootstrap ──
  loadRecipes();
});
</script>
</body>
</html>
