<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Recipe Book</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f7f4;
      --surface: #ffffff;
      --border: #e5e0d8;
      --text: #1a1a1a;
      --text-muted: #6b6560;
      --accent: #c84b00;
      --accent-light: #fff0e8;
      --annotation-bg: #fffbea;
      --annotation-border: #e6c84b;
      --tag-bg: #ede8e0;
      --danger: #c0392b;
      --cook-bg: #1a1a1a;
      --cook-text: #f0ede8;
      --cook-muted: #8a8480;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Layout ── */
    #app { height: 100%; display: flex; flex-direction: column; }

    .view { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .view.active { display: flex; }

    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; }
    .header-back {
      background: none; border: none; cursor: pointer;
      font-size: 1.4rem; color: var(--accent); padding: 4px; line-height: 1;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 16px; border-radius: var(--radius);
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      border: none; transition: opacity .15s;
      text-decoration: none;
    }
    .btn:active { opacity: .75; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--tag-bg); color: var(--text); }
    .btn-ghost { background: none; color: var(--accent); padding: 8px 4px; }
    .btn-danger { background: none; color: var(--danger); }
    .btn-sm { padding: 6px 12px; font-size: 0.82rem; }
    .btn-icon { padding: 8px; border-radius: 50%; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-muted); }
    .btn-icon:active { background: var(--tag-bg); }

    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-size: 1.6rem; border: none; cursor: pointer;
      box-shadow: 0 4px 12px rgba(200,75,0,.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
      z-index: 20;
    }
    .fab:active { transform: scale(.93); }

    /* ── Forms ── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: .04em; margin-bottom: 6px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 1rem; font-family: inherit;
      background: var(--surface); color: var(--text);
      outline: none; transition: border-color .15s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
    }

    /* ── Tags ── */
    .tag {
      display: inline-block; padding: 3px 10px;
      background: var(--tag-bg); border-radius: 20px;
      font-size: 0.78rem; color: var(--text-muted);
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ─────────────────────────────────────────
       LIBRARY VIEW
    ───────────────────────────────────────── */
    #library .header { padding-bottom: 0; flex-direction: column; align-items: stretch; gap: 10px; }
    #library .header-top { display: flex; align-items: center; gap: 12px; }
    #library .header-top h1 { font-size: 1.25rem; }

    .search-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 12px;
      margin-bottom: 12px;
    }
    .search-bar input {
      flex: 1; border: none; background: none; outline: none;
      font-size: 1rem; color: var(--text);
    }
    .search-bar .search-icon { color: var(--text-muted); font-size: 1.1rem; }

    .filter-bar {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; padding: 5px 14px;
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 0.82rem; background: var(--surface); color: var(--text-muted);
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .filter-chip.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }

    .sort-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px 4px; font-size: 0.82rem; color: var(--text-muted);
    }
    .sort-select {
      border: none; background: none; font-size: 0.82rem;
      color: var(--accent); cursor: pointer; font-family: inherit;
      font-weight: 500;
    }

    .recipe-list { padding: 8px 16px 100px; display: flex; flex-direction: column; gap: 10px; }

    .recipe-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 14px 16px; cursor: pointer; transition: border-color .15s;
      text-align: left; width: 100%;
    }
    .recipe-card:active { border-color: var(--accent); }
    .recipe-card-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .recipe-card-meta {
      font-size: 0.8rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .recipe-card-meta .dot { color: var(--border); }
    .recipe-card-tags { margin-top: 8px; }
    .source-badge {
      font-size: 0.72rem; padding: 2px 7px;
      border-radius: 4px; background: var(--tag-bg); color: var(--text-muted);
      font-weight: 500;
    }

    .empty-state {
      text-align: center; padding: 60px 32px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 0.9rem; }

    /* ─────────────────────────────────────────
       RECIPE DETAIL VIEW
    ───────────────────────────────────────── */
    .detail-content { padding: 20px 16px 100px; }

    .detail-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .detail-desc { color: var(--text-muted); margin-bottom: 16px; font-size: 0.95rem; }

    .detail-meta {
      display: flex; flex-wrap: wrap; gap: 16px;
      padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-item .meta-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
    .meta-item .meta-value { font-size: 0.95rem; font-weight: 500; }

    .detail-section { margin-bottom: 28px; }
    .detail-section h2 {
      font-size: 0.82rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); margin-bottom: 12px;
    }

    .ingredient-list { list-style: none; }
    .ingredient-item {
      display: flex; align-items: baseline; gap: 6px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .ingredient-item:last-child { border-bottom: none; }
    .ingredient-qty { font-weight: 600; min-width: 50px; color: var(--accent); }
    .ingredient-unit { color: var(--text-muted); min-width: 36px; }
    .ingredient-name { flex: 1; }
    .ingredient-prep { font-size: 0.82rem; color: var(--text-muted); font-style: italic; }

    .step-list { list-style: none; counter-reset: steps; }
    .step-item {
      display: flex; gap: 14px; padding: 10px 0;
      border-bottom: 1px solid var(--border); font-size: 0.95rem;
      counter-increment: steps;
    }
    .step-item:last-child { border-bottom: none; }
    .step-item::before {
      content: counter(steps);
      min-width: 24px; height: 24px;
      background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 0.78rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }

    /* ── Annotations ── */
    .annotation-panel {
      background: var(--annotation-bg);
      border: 1px solid var(--annotation-border);
      border-radius: var(--radius); padding: 14px;
    }
    .annotation-panel h2 {
      font-size: 0.82rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: #8a7a20; margin-bottom: 12px;
    }
    .annotation-item {
      padding: 8px 0; border-bottom: 1px solid rgba(230,200,75,.3);
      font-size: 0.9rem;
    }
    .annotation-item:last-child { border-bottom: none; }
    .annotation-date { font-size: 0.72rem; color: #8a7a20; margin-bottom: 3px; }
    .annotation-text { line-height: 1.5; }
    .annotation-form { display: flex; gap: 8px; margin-top: 12px; }
    .annotation-form input {
      flex: 1; padding: 9px 12px;
      border: 1px solid var(--annotation-border); border-radius: var(--radius);
      background: var(--surface); font-size: 0.9rem; font-family: inherit; outline: none;
    }
    .annotation-form input:focus { border-color: #8a7a20; }

    /* ── Detail action bar ── */
    .detail-actions {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid var(--border); background: var(--surface);
      overflow-x: auto; scrollbar-width: none;
    }
    .detail-actions::-webkit-scrollbar { display: none; }
    .detail-actions .btn { flex-shrink: 0; }

    /* ─────────────────────────────────────────
       COOK MODE
    ───────────────────────────────────────── */
    #cook {
      background: var(--cook-bg);
      color: var(--cook-text);
    }
    #cook .header {
      background: var(--cook-bg);
      border-bottom-color: #333;
    }
    #cook .header h1 { color: var(--cook-text); }
    #cook .header-back { color: #e06030; }

    .cook-scale-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid #333;
      background: var(--cook-bg);
    }
    .cook-scale-label { font-size: 0.85rem; color: var(--cook-muted); }
    .scale-control {
      display: flex; align-items: center; gap: 12px;
    }
    .scale-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: #333; border: none; color: var(--cook-text);
      font-size: 1.2rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .scale-btn:active { background: #444; }
    .scale-count { font-size: 1.1rem; font-weight: 700; min-width: 32px; text-align: center; }
    .scale-unit { font-size: 0.85rem; color: var(--cook-muted); }

    .cook-content { padding: 20px 16px 40px; }

    .cook-section { margin-bottom: 32px; }
    .cook-section h2 {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--cook-muted); margin-bottom: 14px;
    }

    .cook-ingredient-list { list-style: none; }
    .cook-ingredient-item {
      display: flex; align-items: baseline; gap: 8px;
      padding: 10px 0; border-bottom: 1px solid #2a2a2a;
      font-size: 1.05rem;
    }
    .cook-ingredient-item:last-child { border-bottom: none; }
    .cook-ingredient-qty { font-weight: 700; min-width: 56px; color: #e06030; font-size: 1.1rem; }
    .cook-ingredient-unit { color: var(--cook-muted); min-width: 40px; }
    .cook-ingredient-name { flex: 1; }
    .cook-ingredient-prep { font-size: 0.82rem; color: var(--cook-muted); font-style: italic; }

    .cook-step-list { list-style: none; counter-reset: cook-steps; }
    .cook-step-item {
      display: flex; gap: 16px; padding: 12px 0;
      border-bottom: 1px solid #2a2a2a; font-size: 1.05rem; line-height: 1.6;
      counter-increment: cook-steps;
    }
    .cook-step-item:last-child { border-bottom: none; }
    .cook-step-item::before {
      content: counter(cook-steps);
      min-width: 28px; height: 28px;
      background: #e06030; color: #fff;
      border-radius: 50%; font-size: 0.82rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }

    .cook-annotations {
      background: #1e1c00; border: 1px solid #3a3400;
      border-radius: var(--radius); padding: 14px; margin-top: 24px;
    }
    .cook-annotations h2 {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #8a7a20; margin-bottom: 10px;
    }
    .cook-annotation-item { padding: 6px 0; font-size: 0.9rem; color: #d4c860; line-height: 1.5; }

    /* ─────────────────────────────────────────
       FORM / EDIT VIEW
    ───────────────────────────────────────── */
    .form-view-content { padding: 20px 16px 100px; }

    .ingredient-editor { display: flex; flex-direction: column; gap: 8px; }
    .ingredient-row {
      display: flex; gap: 6px; align-items: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px;
    }
    .ingredient-row input {
      border: none; background: none; outline: none;
      font-size: 0.9rem; font-family: inherit; color: var(--text);
      padding: 2px 4px;
    }
    .ingredient-row .qty-input { width: 52px; }
    .ingredient-row .unit-input { width: 60px; }
    .ingredient-row .name-input { flex: 1; }
    .ingredient-row .prep-input { width: 100px; color: var(--text-muted); font-style: italic; }
    .ingredient-row .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.1rem; padding: 2px 4px;
    }

    .step-editor { display: flex; flex-direction: column; gap: 8px; }
    .step-row {
      display: flex; gap: 8px; align-items: flex-start;
    }
    .step-number {
      min-width: 24px; height: 24px; background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 0.78rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 10px;
    }
    .step-row textarea {
      flex: 1; padding: 9px 10px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 0.9rem; font-family: inherit; resize: none; outline: none;
      min-height: 70px; background: var(--surface); color: var(--text);
    }
    .step-row textarea:focus { border-color: var(--accent); }
    .step-row .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.1rem; padding: 6px 4px;
    }

    .tag-input-area {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 8px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface);
      min-height: 44px; cursor: text;
    }
    .tag-input-area:focus-within { border-color: var(--accent); }
    .tag-pill {
      display: flex; align-items: center; gap: 4px;
      background: var(--tag-bg); border-radius: 20px;
      padding: 2px 8px; font-size: 0.82rem;
    }
    .tag-pill-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 0.9rem; line-height: 1; padding: 0 2px; }
    .tag-input-bare { border: none; outline: none; background: none; font-size: 0.9rem; font-family: inherit; min-width: 80px; }

    .form-actions {
      display: flex; gap: 10px; padding: 14px 16px;
      border-top: 1px solid var(--border); background: var(--surface);
    }
    .form-actions .btn { flex: 1; justify-content: center; }

    /* ─────────────────────────────────────────
       SHOPPING LIST SHEET
    ───────────────────────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 100; display: none; align-items: flex-end;
    }
    .sheet-overlay.open { display: flex; }
    .sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-height: 85vh; display: flex; flex-direction: column;
      animation: slide-up .25s ease;
    }
    @keyframes slide-up {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .sheet-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 12px auto 0;
    }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 10px;
    }
    .sheet-header h2 { font-size: 1rem; font-weight: 600; }
    .sheet-content { flex: 1; overflow-y: auto; padding: 4px 16px 24px; }

    .shopping-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .shopping-item.checked .shopping-check {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .shopping-item.checked .shopping-text {
      text-decoration: line-through; color: var(--text-muted);
    }
    .shopping-text { font-size: 0.95rem; }
    .shopping-qty { font-weight: 600; color: var(--accent); }

    /* ─────────────────────────────────────────
       EXPORT SHEET
    ───────────────────────────────────────── */
    .export-options { display: flex; flex-direction: column; gap: 8px; padding-top: 8px; }
    .export-option {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer; background: var(--surface);
      transition: border-color .15s;
    }
    .export-option:active { border-color: var(--accent); }
    .export-icon { font-size: 1.5rem; }
    .export-label { font-weight: 600; font-size: 0.95rem; }
    .export-desc { font-size: 0.8rem; color: var(--text-muted); }

    /* ─────────────────────────────────────────
       PRINT STYLES
    ───────────────────────────────────────── */
    @media print {
      body { background: #fff; color: #000; font-size: 12pt; }
      #app { display: none; }
      #print-target { display: block !important; }
    }
    #print-target { display: none; }

    .print-recipe { max-width: 700px; margin: 0 auto; padding: 40px; font-family: Georgia, serif; }
    .print-recipe h1 { font-size: 24pt; margin-bottom: 6pt; }
    .print-recipe .print-desc { color: #555; margin-bottom: 12pt; font-size: 11pt; }
    .print-recipe .print-meta { font-size: 10pt; color: #666; margin-bottom: 16pt; display: flex; gap: 20pt; }
    .print-recipe h2 { font-size: 11pt; text-transform: uppercase; letter-spacing: .06em; margin: 16pt 0 8pt; border-bottom: 1pt solid #ddd; padding-bottom: 4pt; }
    .print-recipe .print-ingredient { padding: 4pt 0; border-bottom: .5pt solid #eee; font-size: 11pt; display: flex; gap: 8pt; }
    .print-recipe .print-qty { font-weight: bold; min-width: 60pt; }
    .print-recipe .print-unit { min-width: 40pt; color: #555; }
    .print-recipe .print-step { display: flex; gap: 10pt; padding: 6pt 0; border-bottom: .5pt solid #eee; font-size: 11pt; }
    .print-recipe .print-step-num { font-weight: bold; min-width: 20pt; }
    .print-recipe .print-annotations { background: #fffbea; border: 1pt solid #e6c84b; padding: 10pt; margin-top: 16pt; }
    .print-recipe .print-annotations h2 { border-bottom: none; margin-top: 0; }
    .print-recipe .print-annotation { padding: 4pt 0; font-size: 10pt; }
    .print-recipe .print-source { font-size: 9pt; color: #888; margin-top: 16pt; }

    /* ─────────────────────────────────────────
       UTILITIES
    ───────────────────────────────────────── */
    .hidden { display: none !important; }
    .divider { height: 1px; background: var(--border); margin: 4px 0; }
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--text-muted); gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px;

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://zbyhtcsccjvmhvswlzbg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpieWh0Y3NjY2p2bWh2c3dsemJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTA0MzksImV4cCI6MjA5MDU2NjQzOX0.QxnLcNfeOkbf-vp1utN_461vhq3693Bzngn4av-Aemo';

// ═══════════════════════════════════════════════════════════
//  SUPABASE CLIENT
// ═══════════════════════════════════════════════════════════
const api = {
  async req(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer || 'return=representation',
        ...opts.headers,
      },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    if (res.status === 204) return null;
    return res.json();
  },

  get(path, params = {}) {
    const q = new URLSearchParams(params).toString();
    return this.req(`${path}${q ? '?' + q : ''}`);
  },

  post(path, body) {
    return this.req(path, { method: 'POST', body: JSON.stringify(body) });
  },

  patch(path, body, params = {}) {
    const q = new URLSearchParams(params).toString();
    return this.req(`${path}${q ? '?' + q : ''}`, {
      method: 'PATCH', body: JSON.stringify(body),
      prefer: 'return=representation',
    });
  },

  delete(path, params = {}) {
    const q = new URLSearchParams(params).toString();
    return this.req(`${path}${q ? '?' + q : ''}`, { method: 'DELETE', prefer: '' });
  },
};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let state = {
  recipes: [],        // full list from DB
  currentRecipe: null,
  currentIngredients: [],
  currentSteps: [],
  currentAnnotations: [],
  cookServings: 4,
  filterTag: 'all',
  searchQuery: '',
  sortMode: 'created_desc',
  editingId: null,    // null = new, uuid = edit
  wakeLock: null,
};

// ═══════════════════════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg, duration = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════════════
//  FRACTION DISPLAY
// ═══════════════════════════════════════════════════════════
const FRACS = {
  0.25: '¼', 0.5: '½', 0.75: '¾',
  0.125: '⅛', 0.375: '⅜', 0.625: '⅝', 0.875: '⅞',
  0.333: '⅓', 0.667: '⅔',
};
function formatQty(n) {
  if (n == null) return '';
  const whole = Math.floor(n);
  const dec = Math.round((n - whole) * 1000) / 1000;
  const frac = FRACS[Math.round(dec * 1000) / 1000];
  if (dec === 0) return String(whole || '');
  if (frac) return whole ? `${whole}${frac}` : frac;
  // round to 2 decimal places as fallback
  return n % 1 === 0 ? String(n) : n.toFixed(2).replace(/\.?0+$/, '');
}

function scaleQty(qty, base, current) {
  if (qty == null) return null;
  return (qty / base) * current;
}

// ═══════════════════════════════════════════════════════════
//  LIBRARY
// ═══════════════════════════════════════════════════════════
async function loadRecipes() {
  try {
    const recipes = await api.get('recipes', { select: '*', order: 'created_at.desc' });
    state.recipes = recipes || [];
    buildFilterBar();
    renderLibrary();
  } catch (e) {
    document.getElementById('recipe-list').innerHTML =
      `<div class="empty-state"><p>Error loading recipes: ${e.message}</p></div>`;
  }
}

function buildFilterBar() {
  const tags = new Set();
  state.recipes.forEach(r => (r.tags || []).forEach(t => tags.add(t)));
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `<button class="filter-chip ${state.filterTag === 'all' ? 'active' : ''}" data-filter="all">All</button>`;
  [...tags].sort().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = `filter-chip${state.filterTag === tag ? ' active' : ''}`;
    btn.dataset.filter = tag;
    btn.textContent = tag;
    bar.appendChild(btn);
  });
}

function getFilteredSorted() {
  let list = [...state.recipes];

  // Search
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    list = list.filter(r =>
      r.title.toLowerCase().includes(q) ||
      (r.description || '').toLowerCase().includes(q) ||
      (r.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  // Tag filter
  if (state.filterTag !== 'all') {
    list = list.filter(r => (r.tags || []).includes(state.filterTag));
  }

  // Sort
  switch (state.sortMode) {
    case 'created_desc': list.sort((a, b) => b.created_at.localeCompare(a.created_at)); break;
    case 'created_asc':  list.sort((a, b) => a.created_at.localeCompare(b.created_at)); break;
    case 'alpha':        list.sort((a, b) => a.title.localeCompare(b.title)); break;
    case 'alpha_desc':   list.sort((a, b) => b.title.localeCompare(a.title)); break;
    case 'cooked':       list.sort((a, b) => {
      if (!a.last_cooked_at && !b.last_cooked_at) return 0;
      if (!a.last_cooked_at) return 1;
      if (!b.last_cooked_at) return -1;
      return b.last_cooked_at.localeCompare(a.last_cooked_at);
    }); break;
  }

  return list;
}

function renderLibrary() {
  const list = getFilteredSorted();
  const el = document.getElementById('recipe-list');
  document.getElementById('recipe-count').textContent =
    `${list.length} recipe${list.length !== 1 ? 's' : ''}`;

  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🍽️</div>
      <h3>${state.recipes.length === 0 ? 'No recipes yet' : 'No matches'}</h3>
      <p>${state.recipes.length === 0 ? 'Tap + to add your first recipe.' : 'Try a different search or filter.'}</p>
    </div>`;
    return;
  }

  el.innerHTML = '';
  list.forEach(r => {
    const card = document.createElement('button');
    card.className = 'recipe-card';
    card.dataset.id = r.id;

    const meta = [];
    if (r.prep_time_minutes || r.cook_time_minutes) {
      const total = (r.prep_time_minutes || 0) + (r.cook_time_minutes || 0);
      meta.push(`⏱ ${total}min`);
    }
    if (r.base_servings) meta.push(`⚖️ ${r.base_servings} servings`);
    if (r.last_cooked_at) meta.push(`🍳 ${fmtDate(r.last_cooked_at)}`);

    const sourceBadge = r.source_type !== 'manual'
      ? `<span class="source-badge">${r.source_type}</span>` : '';

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div class="recipe-card-title">${esc(r.title)}</div>
        ${sourceBadge}
      </div>
      ${r.description ? `<div class="recipe-card-meta" style="margin-top:4px">${esc(r.description.slice(0, 80))}${r.description.length > 80 ? '…' : ''}</div>` : ''}
      ${meta.length ? `<div class="recipe-card-meta" style="margin-top:6px">${meta.join('<span class="dot"> · </span>')}</div>` : ''}
      ${r.tags && r.tags.length ? `<div class="recipe-card-tags"><div class="tags">${r.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div></div>` : ''}
    `;
    card.addEventListener('click', () => openDetail(r.id));
    el.appendChild(card);
  });
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════
//  RECIPE DETAIL
// ═══════════════════════════════════════════════════════════
async function openDetail(id) {
  showView('detail');
  document.getElementById('detail-content').innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  document.getElementById('detail-header-title').textContent = '';

  try {
    const [recipe, ingredients, steps, annotations] = await Promise.all([
      api.get(`recipes?id=eq.${id}&select=*`).then(r => r[0]),
      api.get(`ingredients?recipe_id=eq.${id}&select=*&order=sort_order.asc`),
      api.get(`steps?recipe_id=eq.${id}&select=*&order=sort_order.asc`),
      api.get(`annotations?recipe_id=eq.${id}&select=*&order=created_at.asc`),
    ]);

    state.currentRecipe = recipe;
    state.currentIngredients = ingredients || [];
    state.currentSteps = steps || [];
    state.currentAnnotations = annotations || [];

    document.getElementById('detail-header-title').textContent = recipe.title;
    renderDetail();
  } catch (e) {
    document.getElementById('detail-content').innerHTML =
      `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

function renderDetail() {
  const r = state.currentRecipe;
  const ingredients = state.currentIngredients;
  const steps = state.currentSteps;
  const annotations = state.currentAnnotations;

  const meta = [];
  if (r.prep_time_minutes) meta.push({ label: 'Prep', value: `${r.prep_time_minutes} min` });
  if (r.cook_time_minutes) meta.push({ label: 'Cook', value: `${r.cook_time_minutes} min` });
  if (r.prep_time_minutes && r.cook_time_minutes)
    meta.push({ label: 'Total', value: `${r.prep_time_minutes + r.cook_time_minutes} min` });
  meta.push({ label: 'Servings', value: r.base_servings });
  if (r.last_cooked_at) meta.push({ label: 'Last cooked', value: fmtDate(r.last_cooked_at) });
  if (r.source_url) meta.push({ label: 'Source', value: `<a href="${esc(r.source_url)}" target="_blank" style="color:var(--accent)">${new URL(r.source_url).hostname}</a>` });

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-title">${esc(r.title)}</div>
    ${r.description ? `<div class="detail-desc">${esc(r.description)}</div>` : ''}

    ${meta.length ? `<div class="detail-meta">
      ${meta.map(m => `<div class="meta-item">
        <span class="meta-label">${m.label}</span>
        <span class="meta-value">${m.value}</span>
      </div>`).join('')}
    </div>` : ''}

    ${r.tags && r.tags.length ? `<div class="tags" style="margin-bottom:20px">${r.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}

    ${ingredients.length ? `<div class="detail-section">
      <h2>Ingredients</h2>
      <ul class="ingredient-list">
        ${ingredients.map(i => `
          <li class="ingredient-item">
            <span class="ingredient-qty">${esc(formatQty(i.quantity))}</span>
            <span class="ingredient-unit">${esc(i.unit || '')}</span>
            <span class="ingredient-name">${esc(i.name)}</span>
            ${i.prep_note ? `<span class="ingredient-prep">${esc(i.prep_note)}</span>` : ''}
          </li>`).join('')}
      </ul>
    </div>` : ''}

    ${steps.length ? `<div class="detail-section">
      <h2>Steps</h2>
      <ol class="step-list">
        ${steps.map(s => `<li class="step-item">${esc(s.content)}</li>`).join('')}
      </ol>
    </div>` : ''}

    <div class="detail-section">
      <div class="annotation-panel">
        <h2>Your Notes</h2>
        <div id="annotation-list">
          ${annotations.length
            ? annotations.map(a => `
              <div class="annotation-item" data-id="${a.id}">
                <div class="annotation-date">${fmtDate(a.created_at)}</div>
                <div class="annotation-text">${esc(a.content)}</div>
              </div>`).join('')
            : '<div style="font-size:.85rem;color:#8a7a20;font-style:italic">No notes yet.</div>'}
        </div>
        <div class="annotation-form">
          <input type="text" id="annotation-input" placeholder="Add a note…">
          <button class="btn btn-primary btn-sm" id="annotation-submit">Add</button>
        </div>
      </div>
    </div>
  `;

  // Annotation submit
  document.getElementById('annotation-submit').addEventListener('click', addAnnotation);
  document.getElementById('annotation-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addAnnotation();
  });
}

async function addAnnotation() {
  const input = document.getElementById('annotation-input');
  const content = input.value.trim();
  if (!content) return;
  try {
    const [a] = await api.post('annotations', {
      recipe_id: state.currentRecipe.id,
      content,
    });
    state.currentAnnotations.push(a);
    input.value = '';
    renderDetail();
    toast('Note added');
  } catch (e) {
    toast('Error saving note');
  }
}

async function deleteRecipe() {
  if (!state.currentRecipe) return;
  if (!confirm(`Delete "${state.currentRecipe.title}"? This cannot be undone.`)) return;
  try {
    await api.delete(`recipes?id=eq.${state.currentRecipe.id}`);
    state.recipes = state.recipes.filter(r => r.id !== state.currentRecipe.id);
    state.currentRecipe = null;
    renderLibrary();
    showView('library');
    toast('Recipe deleted');
  } catch (e) {
    toast('Error deleting recipe');
  }
}

// ═══════════════════════════════════════════════════════════
//  COOK MODE
// ═══════════════════════════════════════════════════════════
async function openCookMode() {
  const r = state.currentRecipe;
  state.cookServings = r.base_servings || 4;
  document.getElementById('cook-title').textContent = r.title;
  renderCookMode();
  showView('cook');
  await acquireWakeLock();
  // Update last_cooked_at
  try {
    await api.patch(`recipes?id=eq.${r.id}`, { last_cooked_at: new Date().toISOString() });
    const idx = state.recipes.findIndex(x => x.id === r.id);
    if (idx !== -1) state.recipes[idx].last_cooked_at = new Date().toISOString();
    state.currentRecipe.last_cooked_at = new Date().toISOString();
  } catch (_) {}
}

function renderCookMode() {
  const r = state.currentRecipe;
  const base = r.base_servings || 1;
  const current = state.cookServings;
  document.getElementById('scale-count').textContent = current;

  const ingredients = state.currentIngredients;
  const steps = state.currentSteps;
  const annotations = state.currentAnnotations;

  let html = '';

  if (ingredients.length) {
    html += `<div class="cook-section">
      <h2>Ingredients</h2>
      <ul class="cook-ingredient-list">
        ${ingredients.map(i => {
          const scaled = scaleQty(i.quantity, base, current);
          return `<li class="cook-ingredient-item">
            <span class="cook-ingredient-qty">${i.quantity != null ? esc(formatQty(scaled)) : ''}</span>
            <span class="cook-ingredient-unit">${esc(i.unit || '')}</span>
            <span class="cook-ingredient-name">${esc(i.name)}</span>
            ${i.prep_note ? `<span class="cook-ingredient-prep">${esc(i.prep_note)}</span>` : ''}
          </li>`;
        }).join('')}
      </ul>
    </div>`;
  }

  if (steps.length) {
    html += `<div class="cook-section">
      <h2>Steps</h2>
      <ol class="cook-step-list">
        ${steps.map(s => `<li class="cook-step-item">${esc(s.content)}</li>`).join('')}
      </ol>
    </div>`;
  }

  if (annotations.length) {
    html += `<div class="cook-annotations">
      <h2>Your Notes</h2>
      ${annotations.map(a => `<div class="cook-annotation-item">${esc(a.content)}</div>`).join('')}
    </div>`;
  }

  document.getElementById('cook-content').innerHTML = html;
}

async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      state.wakeLock = await navigator.wakeLock.request('screen');
    } catch (_) {}
  }
}

function releaseWakeLock() {
  if (state.wakeLock) {
    state.wakeLock.release().catch(() => {});
    state.wakeLock = null;
  }
}

// ═══════════════════════════════════════════════════════════
//  FORM (ADD / EDIT)
// ═══════════════════════════════════════════════════════════
function openForm(recipe = null) {
  state.editingId = recipe ? recipe.id : null;
  document.getElementById('form-title').textContent = recipe ? 'Edit Recipe' : 'New Recipe';

  // Reset fields
  document.getElementById('f-title').value = recipe?.title || '';
  document.getElementById('f-desc').value = recipe?.description || '';
  document.getElementById('f-servings').value = recipe?.base_servings || 4;
  document.getElementById('f-prep').value = recipe?.prep_time_minutes || '';
  document.getElementById('f-cook').value = recipe?.cook_time_minutes || '';
  document.getElementById('f-source').value = recipe?.source_url || '';

  // Tags
  formState.tags = recipe ? [...(recipe.tags || [])] : [];
  renderTagPills();

  // Ingredients
  formState.ingredients = recipe
    ? state.currentIngredients.map(i => ({ ...i }))
    : [blankIngredient()];
  renderIngredientEditor();

  // Steps
  formState.steps = recipe
    ? state.currentSteps.map(s => ({ ...s }))
    : [blankStep()];
  renderStepEditor();

  showView('form-view');
}

const formState = { tags: [], ingredients: [], steps: [] };

function blankIngredient() {
  return { id: null, quantity: '', unit: '', name: '', prep_note: '', sort_order: 0 };
}
function blankStep() {
  return { id: null, content: '', sort_order: 0 };
}

// Tag pills
function renderTagPills() {
  const area = document.getElementById('tag-input-area');
  const input = document.getElementById('tag-bare-input');
  // Remove existing pills (keep input)
  area.querySelectorAll('.tag-pill').forEach(el => el.remove());
  formState.tags.forEach((tag, i) => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `${esc(tag)}<button type="button" class="tag-pill-remove" data-i="${i}">×</button>`;
    area.insertBefore(pill, input);
  });
}

function addTag(val) {
  const tag = val.trim().toLowerCase();
  if (tag && !formState.tags.includes(tag)) {
    formState.tags.push(tag);
    renderTagPills();
  }
}

// Ingredient editor
function renderIngredientEditor() {
  const editor = document.getElementById('ingredient-editor');
  editor.innerHTML = '';
  formState.ingredients.forEach((ing, i) => {
    const row = document.createElement('div');
    row.className = 'ingredient-row';
    row.innerHTML = `
      <input class="qty-input" type="number" placeholder="Qty" min="0" step="any" value="${esc(ing.quantity)}" data-field="quantity" data-i="${i}">
      <input class="unit-input" type="text" placeholder="Unit" value="${esc(ing.unit || '')}" data-field="unit" data-i="${i}">
      <input class="name-input" type="text" placeholder="Ingredient *" value="${esc(ing.name)}" data-field="name" data-i="${i}">
      <input class="prep-input" type="text" placeholder="Prep note" value="${esc(ing.prep_note || '')}" data-field="prep_note" data-i="${i}">
      <button type="button" class="remove-btn" data-i="${i}">×</button>
    `;
    editor.appendChild(row);
  });
}

function renderStepEditor() {
  const editor = document.getElementById('step-editor');
  editor.innerHTML = '';
  formState.steps.forEach((step, i) => {
    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `
      <div class="step-number">${i + 1}</div>
      <textarea placeholder="Describe this step…" data-i="${i}">${esc(step.content)}</textarea>
      <button type="button" class="remove-btn" data-i="${i}">×</button>
    `;
    editor.appendChild(row);
  });
}

async function saveForm() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Title is required'); return; }

  const servings = parseInt(document.getElementById('f-servings').value) || 4;

  const recipeData = {
    title,
    description: document.getElementById('f-desc').value.trim() || null,
    base_servings: servings,
    prep_time_minutes: parseInt(document.getElementById('f-prep').value) || null,
    cook_time_minutes: parseInt(document.getElementById('f-cook').value) || null,
    source_url: document.getElementById('f-source').value.trim() || null,
    source_type: state.editingId ? state.currentRecipe?.source_type : 'manual',
    tags: formState.tags,
    updated_at: new Date().toISOString(),
  };

  try {
    document.getElementById('form-save-btn').disabled = true;
    document.getElementById('form-save-btn').textContent = 'Saving…';

    let recipeId;

    if (state.editingId) {
      // Update existing
      recipeId = state.editingId;
      await api.patch(`recipes?id=eq.${recipeId}`, recipeData);

      // Delete and re-insert ingredients/steps
      await Promise.all([
        api.delete(`ingredients?recipe_id=eq.${recipeId}`),
        api.delete(`steps?recipe_id=eq.${recipeId}`),
      ]);
    } else {
      // Insert new
      const [rec] = await api.post('recipes', recipeData);
      recipeId = rec.id;
    }

    // Insert ingredients
    const validIngredients = formState.ingredients
      .filter(i => i.name.trim())
      .map((i, idx) => ({
        recipe_id: recipeId,
        sort_order: idx,
        quantity: i.quantity !== '' ? parseFloat(i.quantity) : null,
        unit: i.unit.trim() || null,
        name: i.name.trim(),
        prep_note: i.prep_note.trim() || null,
      }));

    // Insert steps
    const validSteps = formState.steps
      .filter(s => s.content.trim())
      .map((s, idx) => ({
        recipe_id: recipeId,
        sort_order: idx,
        content: s.content.trim(),
      }));

    await Promise.all([
      validIngredients.length ? api.post('ingredients', validIngredients) : Promise.resolve(),
      validSteps.length ? api.post('steps', validSteps) : Promise.resolve(),
    ]);

    toast(state.editingId ? 'Recipe updated!' : 'Recipe saved!');
    await loadRecipes();

    if (state.editingId) {
      await openDetail(recipeId);
    } else {
      showView('library');
    }
  } catch (e) {
    toast(`Error: ${e.message}`);
  } finally {
    document.getElementById('form-save-btn').disabled = false;
    document.getElementById('form-save-btn').textContent = 'Save Recipe';
  }
}

// ═══════════════════════════════════════════════════════════
//  SHOPPING LIST
// ═══════════════════════════════════════════════════════════
function openShoppingList() {
  const r = state.currentRecipe;
  const servings = r.base_servings || 4; // use base for shopping
  document.getElementById('shop-serving-label').textContent = `${servings} servings`;

  const items = state.currentIngredients.map(i => ({
    text: [formatQty(i.quantity), i.unit, i.name, i.prep_note ? `(${i.prep_note})` : '']
      .filter(Boolean).join(' '),
    checked: false,
  }));

  const content = document.getElementById('shop-content');
  if (!items.length) {
    content.innerHTML = '<div style="padding:20px;color:var(--text-muted);text-align:center">No ingredients.</div>';
  } else {
    content.innerHTML = items.map((item, i) => `
      <div class="shopping-item" data-i="${i}">
        <div class="shopping-check"></div>
        <div class="shopping-text">${esc(item.text)}</div>
      </div>`).join('');

    content.querySelectorAll('.shopping-item').forEach(el => {
      el.addEventListener('click', () => {
        el.classList.toggle('checked');
        el.querySelector('.shopping-check').textContent =
          el.classList.contains('checked') ? '✓' : '';
      });
    });
  }

  document.getElementById('shop-overlay').classList.add('open');
}

function copyShoppingList() {
  const items = [...document.querySelectorAll('.shopping-item')]
    .map(el => el.querySelector('.shopping-text').textContent);
  navigator.clipboard.writeText(items.join('\n')).then(() => toast('Copied!'));
}

// ═══════════════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════════════
function openExport() {
  document.getElementById('export-overlay').classList.add('open');
}

function exportPrint() {
  const r = state.currentRecipe;
  const ingredients = state.currentIngredients;
  const steps = state.currentSteps;
  const annotations = state.currentAnnotations;

  const html = `
    <div class="print-recipe">
      <h1>${esc(r.title)}</h1>
      ${r.description ? `<div class="print-desc">${esc(r.description)}</div>` : ''}
      <div class="print-meta">
        ${r.prep_time_minutes ? `<span>Prep: ${r.prep_time_minutes} min</span>` : ''}
        ${r.cook_time_minutes ? `<span>Cook: ${r.cook_time_minutes} min</span>` : ''}
        <span>Servings: ${r.base_servings}</span>
      </div>
      ${ingredients.length ? `
        <h2>Ingredients</h2>
        ${ingredients.map(i => `<div class="print-ingredient">
          <span class="print-qty">${esc(formatQty(i.quantity))}</span>
          <span class="print-unit">${esc(i.unit || '')}</span>
          <span>${esc(i.name)}${i.prep_note ? `, <em>${esc(i.prep_note)}</em>` : ''}</span>
        </div>`).join('')}` : ''}
      ${steps.length ? `
        <h2>Steps</h2>
        ${steps.map((s, i) => `<div class="print-step">
          <span class="print-step-num">${i + 1}.</span>
          <span>${esc(s.content)}</span>
        </div>`).join('')}` : ''}
      ${annotations.length ? `
        <div class="print-annotations">
          <h2>Your Notes</h2>
          ${annotations.map(a => `<div class="print-annotation">
            <strong>${fmtDate(a.created_at)}</strong> — ${esc(a.content)}
          </div>`).join('')}
        </div>` : ''}
      ${r.source_url ? `<div class="print-source">Source: ${esc(r.source_url)}</div>` : ''}
    </div>`;

  document.getElementById('print-target').innerHTML = html;
  document.getElementById('export-overlay').classList.remove('open');
  window.print();
}

function exportJSON() {
  const data = {
    recipe: state.currentRecipe,
    ingredients: state.currentIngredients,
    steps: state.currentSteps,
    annotations: state.currentAnnotations,
    exported_at: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  dlBlob(blob, `${slugify(state.currentRecipe.title)}.json`);
  document.getElementById('export-overlay').classList.remove('open');
}

function exportText() {
  const r = state.currentRecipe;
  const lines = [r.title, ''];
  if (r.description) lines.push(r.description, '');
  const times = [];
  if (r.prep_time_minutes) times.push(`Prep: ${r.prep_time_minutes} min`);
  if (r.cook_time_minutes) times.push(`Cook: ${r.cook_time_minutes} min`);
  times.push(`Servings: ${r.base_servings}`);
  lines.push(times.join('  |  '), '');

  if (state.currentIngredients.length) {
    lines.push('INGREDIENTS', '');
    state.currentIngredients.forEach(i => {
      lines.push([formatQty(i.quantity), i.unit, i.name, i.prep_note].filter(Boolean).join(' '));
    });
    lines.push('');
  }

  if (state.currentSteps.length) {
    lines.push('STEPS', '');
    state.currentSteps.forEach((s, i) => lines.push(`${i + 1}. ${s.content}`));
    lines.push('');
  }

  if (state.currentAnnotations.length) {
    lines.push('YOUR NOTES', '');
    state.currentAnnotations.forEach(a => lines.push(`• ${a.content}`));
  }

  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  dlBlob(blob, `${slugify(r.title)}.txt`);
  document.getElementById('export-overlay').classList.remove('open');
}

function dlBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

// ═══════════════════════════════════════════════════════════
//  EVENT WIRING
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {

  // Library
  document.getElementById('search-input').addEventListener('input', e => {
    state.searchQuery = e.target.value;
    renderLibrary();
  });

  document.getElementById('filter-bar').addEventListener('click', e => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    state.filterTag = chip.dataset.filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderLibrary();
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    state.sortMode = e.target.value;
    renderLibrary();
  });

  document.getElementById('fab-add').addEventListener('click', () => openForm());

  // Detail
  document.getElementById('detail-back').addEventListener('click', () => showView('library'));
  document.getElementById('detail-delete-btn').addEventListener('click', deleteRecipe);
  document.getElementById('cook-btn').addEventListener('click', openCookMode);
  document.getElementById('shop-btn').addEventListener('click', openShoppingList);
  document.getElementById('export-btn').addEventListener('click', openExport);
  document.getElementById('edit-btn').addEventListener('click', () => openForm(state.currentRecipe));

  // Cook
  document.getElementById('cook-back').addEventListener('click', () => {
    releaseWakeLock();
    showView('detail');
    renderDetail(); // re-render detail to show updated last_cooked_at
  });
  document.getElementById('scale-up').addEventListener('click', () => {
    state.cookServings = Math.min(state.cookServings + 1, 99);
    renderCookMode();
  });
  document.getElementById('scale-down').addEventListener('click', () => {
    state.cookServings = Math.max(state.cookServings - 1, 1);
    renderCookMode();
  });

  // Form
  document.getElementById('form-back').addEventListener('click', () => {
    if (state.editingId) { showView('detail'); } else { showView('library'); }
  });
  document.getElementById('form-cancel-btn').addEventListener('click', () => {
    if (state.editingId) { showView('detail'); } else { showView('library'); }
  });
  document.getElementById('form-save-btn').addEventListener('click', saveForm);
  document.getElementById('add-ingredient-btn').addEventListener('click', () => {
    formState.ingredients.push(blankIngredient());
    renderIngredientEditor();
  });
  document.getElementById('add-step-btn').addEventListener('click', () => {
    formState.steps.push(blankStep());
    renderStepEditor();
  });

  // Ingredient editor — delegated events
  document.getElementById('ingredient-editor').addEventListener('input', e => {
    const inp = e.target;
    const i = parseInt(inp.dataset.i);
    if (isNaN(i)) return;
    formState.ingredients[i][inp.dataset.field] = inp.value;
  });
  document.getElementById('ingredient-editor').addEventListener('click', e => {
    const btn = e.target.closest('.remove-btn');
    if (!btn) return;
    const i = parseInt(btn.dataset.i);
    formState.ingredients.splice(i, 1);
    if (!formState.ingredients.length) formState.ingredients.push(blankIngredient());
    renderIngredientEditor();
  });

  // Step editor — delegated events
  document.getElementById('step-editor').addEventListener('input', e => {
    const ta = e.target.closest('textarea');
    if (!ta) return;
    const i = parseInt(ta.dataset.i);
    formState.steps[i].content = ta.value;
    // auto-resize
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });
  document.getElementById('step-editor').addEventListener('click', e => {
    const btn = e.target.closest('.remove-btn');
    if (!btn) return;
    const i = parseInt(btn.dataset.i);
    formState.steps.splice(i, 1);
    if (!formState.steps.length) formState.steps.push(blankStep());
    renderStepEditor();
  });

  // Tags
  document.getElementById('tag-bare-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addTag(e.target.value);
      e.target.value = '';
    } else if (e.key === 'Backspace' && !e.target.value && formState.tags.length) {
      formState.tags.pop();
      renderTagPills();
    }
  });
  document.getElementById('tag-input-area').addEventListener('click', e => {
    const btn = e.target.closest('.tag-pill-remove');
    if (!btn) return;
    formState.tags.splice(parseInt(btn.dataset.i), 1);
    renderTagPills();
  });
  document.getElementById('tag-input-area').addEventListener('click', e => {
    document.getElementById('tag-bare-input').focus();
  });

  // Shopping list
  document.getElementById('shop-close').addEventListener('click', () => {
    document.getElementById('shop-overlay').classList.remove('open');
  });
  document.getElementById('shop-copy-btn').addEventListener('click', copyShoppingList);
  document.getElementById('shop-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('shop-overlay'))
      document.getElementById('shop-overlay').classList.remove('open');
  });

  // Export
  document.getElementById('export-close').addEventListener('click', () => {
    document.getElementById('export-overlay').classList.remove('open');
  });
  document.getElementById('export-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('export-overlay'))
      document.getElementById('export-overlay').classList.remove('open');
  });
  document.getElementById('export-print').addEventListener('click', exportPrint);
  document.getElementById('export-json').addEventListener('click', exportJSON);
  document.getElementById('export-text').addEventListener('click', exportText);

  // Wake Lock re-acquire on visibility change
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' &&
        document.getElementById('cook').classList.contains('active')) {
      await acquireWakeLock();
    }
  });

  // Bootstrap
  loadRecipes();
});
</script>
</body>
</html>
